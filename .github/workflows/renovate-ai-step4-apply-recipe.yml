name: Renovate AI Step 4 Apply Recipe

on:
  workflow_dispatch:
    inputs:
      dependency:
        description: "Dependency in groupId:artifactId format"
        required: true
        default: "junit:junit"
      oldVersion:
        description: "Old dependency version"
        required: true
      newVersion:
        description: "New dependency version"
        required: true
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  apply-rewrite:
    if: startsWith(github.head_ref, 'renovate/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Prepare base pom for pull request
        if: github.event_name == 'pull_request'
        run: |
          echo "dependency=junit:junit" >> "$GITHUB_ENV"
          git show "${{ github.event.pull_request.base.sha }}:pom.xml" > pom-base.xml

      - name: Prepare versions for workflow dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "dependency=${{ inputs.dependency }}" >> "$GITHUB_ENV"
          echo "oldVersion=${{ inputs.oldVersion }}" >> "$GITHUB_ENV"
          echo "newVersion=${{ inputs.newVersion }}" >> "$GITHUB_ENV"

      - name: Run Step 2 dependency analysis
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 .github/scripts/renovate_step2_analyze_changes.py \
              --dependency "$dependency" \
              --base-pom pom-base.xml \
              --head-pom pom.xml \
              --json-out step2-result.json \
              --md-out step2-result.md
          else
            python3 .github/scripts/renovate_step2_analyze_changes.py \
              --dependency "$dependency" \
              --old-version "$oldVersion" \
              --new-version "$newVersion" \
              --head-pom pom.xml \
              --json-out step2-result.json \
              --md-out step2-result.md
          fi

      - name: Run Step 3 impact analysis
        run: |
          python3 .github/scripts/renovate_step3_analyze_impact.py \
            --repo-root . \
            --step2-json step2-result.json \
            --json-out step3-result.json \
            --md-out step3-result.md

      - name: Apply Step 4 OpenRewrite recipe
        run: |
          ./mvnw -B rewrite:run \
            -Drewrite.configLocation=rewrite-step4.yml \
            -Drewrite.activeRecipes=org.acme.renovate.Step4ImpactMigration

      - name: Run tests after migration
        run: |
          ./mvnw -B test -Dtest=\!FailingTest

      - name: Capture git diff
        run: |
          git status --short
          git diff > step4-changes.diff

      - name: Upload step 4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: renovate-ai-step4-apply-recipe
          path: |
            step2-result.json
            step2-result.md
            step3-result.json
            step3-result.md
            step4-changes.diff

      - name: Commit and push changes
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain -- src pom.xml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src pom.xml
            git commit -m "Apply Step 4 OpenRewrite recipe"
            git push
          fi

      - name: Comment result to pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const step3 = fs.readFileSync('step3-result.md', 'utf8');
            const diff = fs.readFileSync('step4-changes.diff', 'utf8');
            const body = [
              '# Renovate AI Step 4 - Applied OpenRewrite Recipe',
              '',
              '## Impact analysis',
              step3,
              '',
              '## Diff preview (first 200 lines)',
              '```diff',
              diff.split('\n').slice(0, 200).join('\n'),
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

